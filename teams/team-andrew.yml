monitors:
  - name: "andrew-homepage-browser-monitor"
    type: "BROWSER"       # Simple Browser
    uri: "https://andrewwnewhouse.com"
    period: "EVERY_HOUR"
    locations: ["US_WEST_1", "US_EAST_1"]
    tags: {application: andrew, environment: production, functional_component: AWN, system_criticality: high}

  - name: "Andrew-VehicleAPI-Check"
    type: "SCRIPTED_API"
    api_url: "https://vpic.nhtsa.dot.gov/api/vehicles/decodewmi/1FD?format=json"
    period: "EVERY_15_MINUTES"
    locations: ["US_EAST_1"]
    http_method: "GET"
    custom_headers: "content-type: applicastion/json"
    tags:
      team: "andrew"
      env: "production"
      responsible-team: "andrew"

  - name: "Andrew-SSL-Check"
    type: "CERT_CHECK"    # SSL Check
    domain: "andrewwnewhouse.com"
    period: "EVERY_DAY"
    locations: ["US_EAST_1"]
    tags:
      team: "alpha"
      env: "production"
      responsible-team: "alpha-sre"

alerts:
  policy_name: "Andrew Alerts"
  notification_emails:                                                              
    - andrewwn@gmail.com                                                            
    - airnewhouse@yahoo.com      
  conditions:
    - name: "Synthetic Monitor Failure"
      nrql: "SELECT count(*) FROM SyntheticCheck WHERE result = 'FAILED'"
      critical_threshold: 0
      threshold_operator: "above"