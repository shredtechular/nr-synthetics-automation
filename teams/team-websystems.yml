monitors:
  - name: "Alpha-Homepages-Ping"
    type: "SIMPLE"        # Ping Monitor
    uri: "https://example.com"
    period: "EVERY_15_MINUTES"
    locations: ["US_EAST_1", "AWS_US_WEST_2"]
    tags: 
      team: "alpha"
      env: "production"
      responsible-team: "alpha-sre"
    
  - name: "Alpha-Login-Browser"
    type: "BROWSER"       # Simple Browser
    uri: "https://example.com/logins"
    period: "EVERY_15_MINUTES"
    locations: ["US_WEST_1"]
    tags: 
      team: "alpha"
      env: "production"
      responsible-team: "alpha-sre"

  - name: "Alpha-SSL-Check"
    type: "CERT_CHECK"    # SSL Check
    domain: "example.com"
    period: "EVERY_DAY"
    locations: ["US_EAST_1"]
    tags: 
      team: "alpha"
      env: "production"
      responsible-team: "alpha-sre"